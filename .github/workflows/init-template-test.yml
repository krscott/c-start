name: Test init-template script

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  init-template:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Check init-template.sh
      run: |
        ./init-template.sh my-test_app
        cmake -B build
        cmake --build build
        ctest --test-dir build --output-on-failure
        ./build/app/mytestapp --help
